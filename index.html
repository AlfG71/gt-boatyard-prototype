<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>El Varadero de Toño — Sistema de Trabajos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #0d1b2a;
  --navy2:      #142232;
  --navy3:      #1c2f45;
  --brass:      #c9922a;
  --brass-light:#e8b84b;
  --brass-dim:  #8a641c;
  --rust:       #b94a2c;
  --sea:        #2a6e8a;
  --sea-light:  #3a8fad;
  --foam:       #eef4f7;
  --white:      #f4f0e8;
  --muted:      #7a8fa0;
  --border:     rgba(201,146,42,0.18);
  --green:      #2a7a4f;
  --green-light:#3aaa6f;
  --amber:      #c9762a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Crimson Pro', serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.35;
}

/* ── TOP NAV ── */
.topnav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--navy);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 1.2rem;
  height: 54px;
}

.brand { display: flex; align-items: center; gap: 0.55rem; }
.brand-anchor { font-size: 1rem; color: var(--brass); opacity: 0.7; }
.brand-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem; letter-spacing: 0.12em;
  color: var(--brass-light); line-height: 1;
}
.brand-sub {
  font-size: 0.58rem; color: var(--muted);
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-top: 1px; font-family: 'DM Mono', monospace;
}

.pills {
  display: flex;
  background: var(--navy2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px; gap: 2px;
}
.pill {
  padding: 0.28rem 0.85rem;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer; border: none;
  background: transparent; color: var(--muted);
  transition: all 0.2s;
}
.pill.on { background: var(--brass); color: var(--navy); font-weight: 500; }

/* ── VIEWS ── */
.view { display: none; padding-top: 54px; min-height: 100vh; }
.view.active { display: block; }

/* slide transition */
.slide-in {
  animation: slideIn 0.28s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(18px); }
  to   { opacity: 1; transform: translateX(0); }
}
.slide-back {
  animation: slideBack 0.28s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideBack {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ════════════════════════════════
   OWNER DASHBOARD
════════════════════════════════ */
.dash-hero {
  background: linear-gradient(140deg, var(--navy2) 0%, var(--navy3) 100%);
  padding: 1.8rem 1.4rem 1.4rem;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.dash-hero::after {
  content: '⚓';
  position: absolute; right: -12px; top: 50%;
  transform: translateY(-50%);
  font-size: 9rem; opacity: 0.04;
  pointer-events: none; line-height: 1;
}
.dash-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--brass);
  margin-bottom: 0.25rem;
}
.dash-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem; letter-spacing: 0.07em;
  color: var(--white); line-height: 1;
}
.dash-stats {
  display: flex; gap: 1.4rem; margin-top: 1.1rem;
}
.stat { display: flex; flex-direction: column; gap: 0.1rem; }
.stat-n {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.7rem; color: var(--brass-light); line-height: 1;
}
.stat-l {
  font-size: 0.6rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}
.sdiv { width: 1px; background: var(--border); align-self: stretch; }

/* section label */
.sec-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--brass-dim);
  display: flex; align-items: center; gap: 0.5rem;
  margin: 1.2rem 0 0.7rem;
}
.sec-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.jobs-wrap {
  padding: 0 1.2rem 2rem;
  max-width: 680px; margin: 0 auto;
}

/* Job card */
.jcard {
  background: var(--navy2);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 1rem;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.jcard:active { transform: scale(0.995); }

.jcard-top {
  padding: 0.9rem 1.1rem 0.75rem;
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 0.8rem;
  border-bottom: 1px solid var(--border);
}

.jcard-left { display: flex; align-items: flex-start; gap: 0.65rem; flex: 1; min-width: 0; }

.boat-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: grid; place-items: center;
  font-size: 1.1rem; flex-shrink: 0;
  margin-top: 2px;
}

.jcard-info { flex: 1; min-width: 0; }
.boat-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem; letter-spacing: 0.05em;
  color: var(--white); line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.boat-meta {
  font-size: 0.75rem; color: var(--muted);
  margin-top: 0.18rem; font-style: italic;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.boat-days {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; color: var(--muted);
  margin-top: 0.22rem; letter-spacing: 0.05em;
}
.boat-days.urgent { color: var(--rust); }

.badge {
  padding: 0.22rem 0.55rem;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.06em;
  text-transform: uppercase; font-weight: 500;
  white-space: nowrap; flex-shrink: 0;
}
.b-active  { background: rgba(42,122,79,0.2);  color: var(--green-light); border: 1px solid rgba(42,122,79,0.3); }
.b-wait    { background: rgba(201,146,42,0.15); color: var(--brass-light); border: 1px solid rgba(201,146,42,0.25); }
.b-done    { background: rgba(42,110,138,0.2);  color: var(--sea-light);   border: 1px solid rgba(42,110,138,0.3); }

/* mini progress bar in card */
.jcard-progress {
  padding: 0.6rem 1.1rem 0;
  display: flex; align-items: center; gap: 0.6rem;
}
.mini-bar-bg {
  flex: 1; height: 4px; background: var(--navy3);
  border-radius: 2px; overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brass-dim), var(--brass-light));
  border-radius: 2px; transition: width 0.5s ease;
}
.mini-pct {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; color: var(--brass-dim);
  white-space: nowrap; min-width: 28px; text-align: right;
}

/* current step chip */
.current-step-chip {
  margin: 0.5rem 1.1rem 0;
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: rgba(201,146,42,0.1);
  border: 1px solid rgba(201,146,42,0.2);
  border-radius: 5px; padding: 0.3rem 0.6rem;
}
.chip-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--brass); animation: blink 1.8s infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; } 50% { opacity: 0.3; }
}
.chip-text {
  font-size: 0.78rem; color: var(--brass-light);
  font-style: italic;
}

/* step list (collapsible) */
.steps-toggle {
  width: 100%; padding: 0.55rem 1.1rem;
  background: transparent; border: none;
  color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.08em;
  text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; gap: 0.4rem;
  transition: color 0.2s;
}
.steps-toggle:hover { color: var(--brass-light); }
.toggle-arrow { transition: transform 0.25s; font-size: 0.5rem; }
.steps-toggle.open .toggle-arrow { transform: rotate(180deg); }

.steps-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease;
  border-top: 1px solid transparent;
}
.steps-body.open {
  max-height: 600px;
  border-top-color: var(--border);
}

.step-track { padding: 0.6rem 1.1rem; display: flex; flex-direction: column; }
.step-row {
  display: flex; align-items: center;
  gap: 0.7rem; padding: 0.38rem 0;
  position: relative;
}
.step-row:not(:last-child)::after {
  content: ''; position: absolute;
  left: 10px; top: calc(50% + 10px);
  width: 2px; height: calc(100% - 10px);
  background: var(--border); z-index: 0;
}
.sdot {
  width: 21px; height: 21px; border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--navy);
  display: grid; place-items: center;
  font-size: 0.6rem; flex-shrink: 0;
  position: relative; z-index: 1;
  transition: all 0.3s;
}
.sdot.done    { background: var(--green);  border-color: var(--green-light); color: #fff; }
.sdot.current { background: var(--brass);  border-color: var(--brass-light); color: var(--navy); animation: pulse 2s infinite; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,146,42,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(201,146,42,0); }
}
.stext { font-size: 0.85rem; color: var(--muted); flex: 1; line-height: 1.2; }
.stext.done    { color: var(--white); }
.stext.current { color: var(--brass-light); font-weight: 600; }
.stime { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); opacity: 0.65; }

/* actions */
.jcard-actions {
  padding: 0.7rem 1.1rem 0.9rem;
  display: flex; gap: 0.5rem;
  border-top: 1px solid var(--border);
  margin-top: 0.5rem;
}
.btn-complete {
  flex: 1; padding: 0.65rem 0.8rem;
  background: var(--brass); color: var(--navy);
  border: none; border-radius: 7px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem; letter-spacing: 0.1em;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center;
  justify-content: center; gap: 0.35rem;
}
.btn-complete:hover  { background: var(--brass-light); transform: translateY(-1px); }
.btn-complete:active { transform: translateY(0); }
.btn-complete:disabled {
  background: var(--navy3); color: var(--muted);
  cursor: not-allowed; transform: none;
}

.btn-client {
  padding: 0.65rem 0.85rem;
  background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-radius: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.07em;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.btn-client:hover { border-color: var(--brass-dim); color: var(--brass-light); }

/* parts info */
.parts-info {
  margin: 0 1.1rem 0.5rem;
  padding: 0.6rem 0.8rem;
  background: rgba(201,118,42,0.08);
  border: 1px solid rgba(201,118,42,0.2);
  border-radius: 6px;
  font-size: 0.78rem; color: var(--amber);
  display: flex; align-items: center; gap: 0.5rem;
  font-style: italic;
}

/* ════════════════════════════════
   CUSTOMER VIEW
════════════════════════════════ */
#view-customer {
  background: var(--foam);
  color: var(--navy);
}

.cust-topbar {
  background: var(--navy);
  padding: 1.2rem 1.4rem 1rem;
  position: relative; overflow: hidden;
}
.cust-topbar::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--brass-dim), var(--brass-light), var(--brass-dim));
}
.back-btn {
  display: flex; align-items: center; gap: 0.3rem;
  background: none; border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem; color: var(--muted);
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; margin-bottom: 0.8rem;
  transition: color 0.2s; padding: 0;
}
.back-btn:hover { color: var(--brass-light); }
.cust-yard {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: 0.14em;
  color: var(--brass-light); line-height: 1;
}
.cust-sub {
  font-size: 0.68rem; color: var(--muted);
  letter-spacing: 0.08em; margin-top: 0.15rem;
  font-family: 'DM Mono', monospace;
}

.cust-body { padding: 1.2rem 1.2rem 3rem; max-width: 480px; margin: 0 auto; }

/* boat status card */
.cboat-card {
  background: white; border-radius: 12px;
  box-shadow: 0 2px 16px rgba(13,27,42,0.1);
  overflow: hidden; margin-bottom: 1.1rem;
}
.cboat-head {
  background: var(--navy2);
  padding: 1rem 1.2rem;
  display: flex; align-items: center;
  justify-content: space-between; gap: 0.8rem;
}
.cboat-left { display: flex; align-items: center; gap: 0.65rem; }
.cboat-icon {
  width: 38px; height: 38px; border-radius: 8px;
  display: grid; place-items: center; font-size: 1.2rem;
}
.cboat-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem; letter-spacing: 0.06em;
  color: var(--white); line-height: 1;
}
.cboat-detail { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-top: 0.1rem; }
.cboat-badge {
  padding: 0.22rem 0.6rem;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.07em;
  text-transform: uppercase; white-space: nowrap;
}
.cb-active { background: rgba(201,146,42,0.2); border: 1px solid var(--brass); color: var(--brass-light); }
.cb-done   { background: rgba(42,122,79,0.2);  border: 1px solid var(--green); color: var(--green-light); }

/* progress bar */
.cprog-wrap { padding: 0.9rem 1.2rem 0.6rem; border-bottom: 1px solid #eee; }
.cprog-labels {
  display: flex; justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem; color: #aaa; margin-bottom: 0.45rem;
}
.cprog-labels strong { color: var(--brass); }
.pbar-bg {
  height: 7px; background: #e8e8e8;
  border-radius: 4px; overflow: hidden;
}
.pbar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brass-dim), var(--brass-light));
  border-radius: 4px; transition: width 0.6s ease;
}

/* current step callout */
.ccurrent-callout {
  margin: 0.7rem 1.2rem;
  padding: 0.65rem 0.9rem;
  background: rgba(201,146,42,0.07);
  border-left: 3px solid var(--brass);
  border-radius: 0 6px 6px 0;
  font-size: 0.85rem; color: #555;
  font-style: italic; line-height: 1.4;
}
.ccurrent-callout strong { color: var(--brass); font-style: normal; }

/* steps list */
.csteps { padding: 0.6rem 1.2rem 1rem; }
.cstep {
  display: flex; gap: 0.8rem;
  padding: 0.5rem 0; align-items: flex-start;
  position: relative;
}
.cstep:not(:last-child)::after {
  content: ''; position: absolute;
  left: 11px; top: 28px;
  width: 2px; height: calc(100% - 10px);
  background: #e8e8e8;
}
.cdot {
  width: 24px; height: 24px; border-radius: 50%;
  flex-shrink: 0; display: grid; place-items: center;
  font-size: 0.68rem; position: relative; z-index: 1;
  margin-top: 1px; font-weight: 500;
}
.cdot.done    { background: var(--green);  color: white; }
.cdot.current { background: var(--brass);  color: var(--navy); animation: cpulse 2s infinite; }
.cdot.pending { background: #eaeaea; color: #bbb; }
@keyframes cpulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,146,42,0.3); }
  50%      { box-shadow: 0 0 0 5px rgba(201,146,42,0); }
}
.cstep-info { flex: 1; }
.cstep-name { font-size: 0.9rem; font-weight: 600; color: var(--navy); line-height: 1.2; }
.cstep-name.pending { color: #bbb; font-weight: 400; }
.cstep-name.current { color: var(--brass); }
.cstep-time { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: #bbb; margin-top: 0.1rem; }
.cstep-time.done    { color: var(--green); }
.cstep-time.current { color: var(--brass); }

/* messages */
.cmsg-card {
  background: white; border-radius: 12px;
  box-shadow: 0 2px 16px rgba(13,27,42,0.1);
  overflow: hidden; margin-bottom: 1.1rem;
}
.cmsg-head {
  padding: 0.75rem 1.2rem;
  border-bottom: 1px solid #f0f0f0;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: #aaa;
  display: flex; align-items: center; gap: 0.4rem;
}
.cmsg { display: flex; gap: 0.7rem; padding: 0.75rem 1.2rem; border-bottom: 1px solid #f8f8f8; align-items: flex-start; }
.cmsg:last-child { border-bottom: none; }
.cmsg-time { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: #ccc; white-space: nowrap; padding-top: 3px; min-width: 48px; }
.cmsg-bubble {
  background: #f4f4f4; border-radius: 0 8px 8px 8px;
  padding: 0.5rem 0.75rem; font-size: 0.83rem;
  color: var(--navy); line-height: 1.45; flex: 1;
  border: 1px solid #ebebeb;
}
.cmsg-bubble.new { background: rgba(42,122,79,0.06); border-color: rgba(42,122,79,0.18); }
.cmsg-bubble.final { background: rgba(42,110,138,0.06); border-color: rgba(42,110,138,0.2); }

/* contact */
.ccontact {
  background: var(--navy2); border-radius: 12px;
  padding: 1.1rem 1.2rem;
  display: flex; align-items: center;
  justify-content: space-between; gap: 1rem;
}
.ccontact-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem; letter-spacing: 0.08em;
  color: var(--brass-light); margin-bottom: 0.15rem;
}
.ccontact-info { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.btn-call {
  padding: 0.55rem 1.1rem;
  background: var(--brass); color: var(--navy);
  border: none; border-radius: 7px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.92rem; letter-spacing: 0.1em;
  cursor: pointer; white-space: nowrap;
  transition: background 0.2s;
}
.btn-call:hover { background: var(--brass-light); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(90px);
  background: var(--navy3);
  border: 1px solid var(--green);
  border-radius: 10px;
  padding: 0.8rem 1.1rem;
  display: flex; align-items: center; gap: 0.65rem;
  z-index: 300;
  transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
  min-width: 270px; max-width: 88vw;
  box-shadow: 0 8px 28px rgba(0,0,0,0.45);
}
#toast.show { transform: translateX(-50%) translateY(0); }
.t-icon { width: 30px; height: 30px; background: var(--green); border-radius: 50%; display: grid; place-items: center; font-size: 0.85rem; flex-shrink: 0; }
.t-title { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--green-light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.12rem; }
.t-body  { font-size: 0.8rem; color: var(--white); line-height: 1.35; }

/* ── RESPONSIVE ── */
@media (max-width: 420px) {
  .brand-name { font-size: 1rem; }
  .pill { padding: 0.25rem 0.6rem; font-size: 0.58rem; }
  .dash-stats { gap: 1rem; }
  .stat-n { font-size: 1.5rem; }
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="brand">

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentBoat = 'seabreeze';
let toastTimer = null;

// ══════════════════════════════════════════════
//  RENDER OWNER DASHBOARD
// ══════════════════════════════════════════════
function renderDashboard() {
  const active  = BOATS.filter(b => b.status === 'active');
  const waiting = BOATS.filter(b => b.status === 'waiting');
  const done    = BOATS.filter(b => b.status === 'done');

  document.getElementById('stat-active').textContent = active.length;
  document.getElementById('stat-done').textContent   = done.length;

  document.getElementById('active-jobs').innerHTML  = active.map(renderJobCard).join('');
  document.getElementById('waiting-jobs').innerHTML = waiting.map(renderJobCard).join('');
  document.getElementById('done-jobs').innerHTML    = done.map(renderJobCard).join('');
}

function renderJobCard(boat) {
  const doneSteps = boat.steps.filter(s => s.done).length;
  const total     = boat.steps.length;
  const pct       = Math.round((doneSteps / total) * 100);
  const currentStep = boat.steps.find(s => s.current);
  const urgentClass = boat.daysIn >= 3 ? ' urgent' : '';

  let badgeHtml = '';
  if      (boat.status === 'active')  badgeHtml = `<div class="badge b-active">En Proceso</div>`;
  else if (boat.status === 'waiting') badgeHtml = `<div class="badge b-wait">⏳ Esperando Pieza</div>`;
  else if (boat.status === 'done')    badgeHtml = `<div class="badge b-done">Listo ✓</div>`;

  let actionBtn = '';
  if (boat.status === 'active' && currentStep) {
    actionBtn = `<button class="btn-complete" onclick="advanceStep('${boat.id}')">✓ &nbsp;Completar: ${currentStep.name}</button>`;
  } else if (boat.status === 'waiting') {
    actionBtn = `<button class="btn-complete" disabled>⏳ &nbsp;Esperando Pieza</button>`;
  } else if (boat.status === 'done') {
    actionBtn = `<button class="btn-complete" style="background:var(--sea);color:white" onclick="sendPickupNotice('${boat.id}')">📱 &nbsp;Notificar Recogida</button>`;
  }

  const partsHtml = boat.status === 'waiting'
    ? `<div class="parts-info">📦 ${boat.partsNote}</div>`
    : '';

  const currentChip = currentStep
    ? `<div class="current-step-chip"><div class="chip-dot"></div><div class="chip-text">Ahora: ${currentStep.name}</div></div>`
    : (boat.status === 'done' ? `<div class="current-step-chip" style="background:rgba(42,110,138,0.1);border-color:rgba(42,110,138,0.25)"><div class="chip-dot" style="background:var(--sea-light);animation:none"></div><div class="chip-text" style="color:var(--sea-light)">Trabajo completado — listo para entrega</div></div>` : '');

  return `
  <div class="jcard" id="jcard-${boat.id}">
    <div class="jcard-top">
      <div class="jcard-left">
        <div class="boat-icon" style="background:${boat.iconBg}">${boat.icon}</div>
        <div class="jcard-info">
          <div class="boat-name">${boat.name}</div>
          <div class="boat-meta">${boat.owner} · ${boat.size} · ${boat.job}</div>
          <div class="boat-days${urgentClass}">Día ${boat.daysIn} en el yard</div>
        </div>
      </div>
      ${badgeHtml}
    </div>
    <div class="jcard-progress">
      <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
      <div class="mini-pct">${pct}%</div>
    </div>
    ${currentChip}
    ${partsHtml}
    <button class="steps-toggle" id="toggle-${boat.id}" onclick="toggleSteps('${boat.id}')">
      <span>Ver pasos del trabajo</span>
      <span style="flex:1"></span>
      <span class="toggle-arrow">▼</span>
    </button>
    <div class="steps-body" id="sbody-${boat.id}">
      <div class="step-track">
        ${boat.steps.map((s, i) => {
          let dc = '', dtxt = i+1, tc = '', tt = s.time;
          if (s.done)    { dc='done'; dtxt='✓'; tc='done'; }
          else if(s.current){ dc='current'; dtxt='●'; tc='current'; }
          return `<div class="step-row"><div class="sdot ${dc}">${dtxt}</div><div class="stext ${tc}">${s.name}</div><div class="stime">${tt}</div></div>`;
        }).join('')}
      </div>
    </div>
    <div class="jcard-actions">
      ${actionBtn}
      <button class="btn-client" onclick="openClientView('${boat.id}')">👁 Ver Cliente</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
//  TOGGLE STEPS
// ══════════════════════════════════════════════
function toggleSteps(id) {
  const body = document.getElementById(`sbody-${id}`);
  const btn  = document.getElementById(`toggle-${id}`);
  const open = body.classList.toggle('open');
  btn.classList.toggle('open', open);
}

// ══════════════════════════════════════════════
//  ADVANCE STEP
// ══════════════════════════════════════════════
function advanceStep(boatId) {
  const boat = BOATS.find(b => b.id === boatId);
  if (!boat) return;

  const now = new Date().toLocaleTimeString('es-PR', { hour: '2-digit', minute: '2-digit' });
  const curIdx = boat.steps.findIndex(s => s.current);
  if (curIdx === -1) return;

  const stepName = boat.steps[curIdx].name;
  boat.steps[curIdx].done = true;
  boat.steps[curIdx].current = false;
  boat.steps[curIdx].time = now;

  let msgText = '';
  if (curIdx + 1 < boat.steps.length) {
    boat.steps[curIdx + 1].current = true;
    boat.steps[curIdx + 1].time = 'Ahora';
    const next = boat.steps[curIdx + 1].name;
    msgText = `${stepName} completado ✓. Continuamos con: ${next}.`;
  } else {
    boat.status = 'done';
    msgText = `🎉 ¡Trabajo completado! Su bote ${boat.name} está listo para recogida. Llámenos para coordinar. ¡Gracias!`;
    document.getElementById('stat-active').textContent =
      parseInt(document.getElementById('stat-active').textContent) - 1;
    document.getElementById('stat-done').textContent =
      parseInt(document.getElementById('stat-done').textContent) + 1;
  }

  boat.messages.push({ time: now, text: msgText, isNew: true });

  renderDashboard();
  showToast(`${boat.name}: ${msgText}`);

  // If currently viewing this boat's customer page, refresh it
  if (currentBoat === boatId && document.getElementById('view-customer').classList.contains('active')) {
    renderCustomerView(boatId);
  }
}

// ══════════════════════════════════════════════
//  PICKUP NOTIFICATION
// ══════════════════════════════════════════════
function sendPickupNotice(boatId) {
  const boat = BOATS.find(b => b.id === boatId);
  const now  = new Date().toLocaleTimeString('es-PR', { hour: '2-digit', minute: '2-digit' });
  const msg  = `Recordatorio: su bote ${boat.name} está listo para recogida cuando guste. Llámenos para coordinar. ¡Gracias!`;
  boat.messages.push({ time: now, text: msg, isNew: true, isFinal: true });
  showToast(`${boat.name}: ${msg}`);
}

// ══════════════════════════════════════════════
//  RENDER CUSTOMER VIEW
// ══════════════════════════════════════════════
function renderCustomerView(boatId) {
  const boat = BOATS.find(b => b.id === boatId);
  if (!boat) return;

  const doneCount = boat.steps.filter(s => s.done).length;
  const pct       = Math.round((doneCount / boat.steps.length) * 100);
  const curStep   = boat.steps.find(s => s.current);
  const badgeClass = boat.status === 'done' ? 'cb-done' : 'cb-active';
  const badgeTxt   = boat.status === 'done' ? 'Listo ✓' : 'En Proceso';

  const stepsHtml = boat.steps.map((s, i) => {
    let dc='pending', dtxt=i+1, nc='pending', tc='', tl='Pendiente';
    if (s.done)    { dc='done'; dtxt='✓'; nc=''; tc='done'; tl=`Completado — ${s.time}`; }
    else if(s.current){ dc='current'; dtxt='●'; nc='current'; tc='current'; tl='En proceso ahora mismo'; }
    return `<div class="cstep">
      <div class="cdot ${dc}">${dtxt}</div>
      <div class="cstep-info">
        <div class="cstep-name ${nc}">${s.name}</div>
        <div class="cstep-time ${tc}">${tl}</div>
      </div>
    </div>`;
  }).join('');

  const calloutHtml = curStep
    ? `<div class="ccurrent-callout">Su embarcación está en este momento en el paso de <strong>${curStep.name}</strong>. Le notificaremos al completarlo.</div>`
    : (boat.status === 'done' ? `<div class="ccurrent-callout" style="border-color:var(--green)">🎉 <strong>¡Trabajo completado!</strong> Su bote está listo para recogida.</div>` : '');

  const msgsHtml = boat.messages.map(m =>
    `<div class="cmsg">
      <div class="cmsg-time">${m.time}</div>
      <div class="cmsg-bubble${m.isNew ? ' new' : ''}${m.isFinal ? ' final' : ''}">${m.text}</div>
    </div>`
  ).join('');

  document.getElementById('cust-body').innerHTML = `
    <div class="cboat-card">
      <div class="cboat-head">
        <div class="cboat-left">
          <div class="cboat-icon" style="background:${boat.iconBg}">${boat.icon}</div>
          <div>
            <div class="cboat-name">${boat.name}</div>
            <div class="cboat-detail">${boat.owner} · ${boat.size} · ${boat.job}</div>
          </div>
        </div>
        <div class="cboat-badge ${badgeClass}">${badgeTxt}</div>
      </div>
      <div class="cprog-wrap">
        <div class="cprog-labels">
          <span>Progreso del trabajo</span>
          <strong>${pct}%</strong>
        </div>
        <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
      </div>
      ${calloutHtml}
      <div class="csteps">${stepsHtml}</div>
    </div>
    <div class="cmsg-card">
      <div class="cmsg-head">📱 Mensajes enviados al cliente</div>
      ${msgsHtml}
    </div>
    <div class="ccontact">
      <div>
        <div class="ccontact-name">El Varadero de Toño</div>
        <div class="ccontact-info">¿Preguntas? Estamos disponibles.<br>Lun–Vie · 7:00 AM – 5:00 PM</div>
      </div>
      <button class="btn-call">📞 Llamar</button>
    </div>
  `;
}

// ══════════════════════════════════════════════
//  VIEW SWITCHING
// ══════════════════════════════════════════════
function openClientView(boatId) {
  currentBoat = boatId;
  renderCustomerView(boatId);
  document.getElementById('view-owner').classList.remove('active');
  const cv = document.getElementById('view-customer');
  cv.classList.add('active');
  cv.classList.remove('slide-back');
  void cv.offsetWidth;
  cv.classList.add('slide-in');
  document.getElementById('pill-owner').classList.remove('on');
  document.getElementById('pill-client').classList.add('on');
  cv.scrollTop = 0;
  window.scrollTo(0,0);
}

function showCustomer(boatId) {
  currentBoat = boatId || currentBoat;
  renderCustomerView(currentBoat);
  document.getElementById('view-owner').classList.remove('active');
  const cv = document.getElementById('view-customer');
  cv.classList.add('active');
  cv.classList.remove('slide-back');
  void cv.offsetWidth;
  cv.classList.add('slide-in');
  document.getElementById('pill-owner').classList.remove('on');
  document.getElementById('pill-client').classList.add('on');
  window.scrollTo(0,0);
}

function showOwner(back) {
  document.getElementById('view-customer').classList.remove('active');
  const ov = document.getElementById('view-owner');
  ov.classList.add('active');
  if (back) {
    ov.classList.remove('slide-in');
    void ov.offsetWidth;
    ov.classList.add('slide-back');
  }
  document.getElementById('pill-client').classList.remove('on');
  document.getElementById('pill-owner').classList.add('on');
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function showToast(msg) {
  document.getElementById('t-body').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
renderDashboard();
</script>
